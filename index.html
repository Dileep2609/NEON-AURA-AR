<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEON AURA AR</title>

  <link rel="stylesheet" href="css/style.css">

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
</head>

<body>

<div id="startOverlay">
  <h1>NEON AURA AR</h1>
  <button class="start-btn" id="startBtn">Enter Experience</button>
</div>

<video class="input_video" playsinline muted></video>

<canvas id="bgCanvas"></canvas>
<canvas id="mainCanvas"></canvas>

<div id="hud">
  <div class="panel">
    <div>Hands: <span id="ui-hands">0</span></div>
    <div>FPS: <span id="ui-fps">0</span></div>
  </div>

  <div class="panel">
    <div>Gesture: <span id="ui-gesture">None</span></div>
    <div>Spread: <span id="ui-spread">0%</span></div>
  </div>
</div>

<div id="themes">
  <button class="theme-btn" data-theme="Rainbow">Rainbow</button>
  <button class="theme-btn" data-theme="Cyberpunk">Cyberpunk</button>
  <button class="theme-btn" data-theme="Ocean">Ocean</button>
</div>

<script src="js/themes.js"></script>
<script src="js/particles.js"></script>
<script src="js/gestures.js"></script>
<script src="js/renderer.js"></script>
<script src="js/mediapipe.js"></script>
<script src="js/app.js"></script>

</body>
</html>
